spring:
  application:
    name: currencyconvertor

  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27018/currency_db}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

  # Google OAuth 2.0 (Resource Server)
  # Create OAuth client at https://console.cloud.google.com/apis/credentials
  # GOOGLE_CLIENT_ID=xxxx.apps.googleusercontent.com
  # GOOGLE_CLIENT_SECRET= (only needed if you add OAuth2 Login later; not used by JWT validation)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com
          jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs

server:
  port: ${SERVER_PORT:8082}

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
