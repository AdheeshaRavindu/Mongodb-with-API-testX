spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOriginPatterns: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: false
          routes:
            - id: auth-route
              uri: http://${TEMP_SERVICE_HOST:localhost}:${TEMP_SERVICE_PORT:8081}
              predicates:
                - Path=/auth/**
            - id: temperature-route
              uri: http://${TEMP_SERVICE_HOST:localhost}:${TEMP_SERVICE_PORT:8081}
              predicates:
                - Path=/api/temperatures/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH:10}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST:20}
                    redis-rate-limiter.requestedTokens: 1
            - id: currency-route
              uri: http://${CURRENCY_SERVICE_HOST:localhost}:${CURRENCY_SERVICE_PORT:8082}
              predicates:
                - Path=/api/currency/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH:10}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST:20}
                    redis-rate-limiter.requestedTokens: 1

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key}

management:
  endpoints:
    web:
      exposure:
        include: health
