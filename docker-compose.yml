services:
  mongo-temp:
    image: mongo:7.0
    container_name: mongo-temp
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-temp-data:/data/db
      - ./docs/mongo-seed-api-keys.js:/docker-entrypoint-initdb.d/01-api-keys.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-currency:
    image: mongo:7.0
    container_name: mongo-currency
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-currency-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-seed:
    image: mongo:7.0
    container_name: mongo-seed
    depends_on:
      mongo-temp:
        condition: service_healthy
    volumes:
      - ./docs/mongo-seed-api-keys.js:/seed.js:ro
    entrypoint: ["mongosh", "mongodb://mongo-temp:27017/temp_db", "--file", "/seed.js"]
    restart: "no"

  mongo-currency-seed:
    image: mongo:7.0
    container_name: mongo-currency-seed
    depends_on:
      mongo-currency:
        condition: service_healthy
    volumes:
      - ./docs/mongo-seed-api-keys.js:/seed.js:ro
    entrypoint: ["mongosh", "mongodb://mongo-currency:27017/currency_db", "--file", "/seed.js"]
    restart: "no"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "56720:5672"  # host 56720: Windows often reserves 5651-5750 (Hyper-V/WSL)
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  tempconv:
    build:
      context: ./tempconv
    container_name: tempconv
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo-temp:27017/temp_db
      SERVER_PORT: 8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-860796838827-g7bn0tq1cc50sndut1rukdl19t4tgm6h.apps.googleusercontent.com}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-key}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
    expose:
      - "8081"
    depends_on:
      mongo-temp:
        condition: service_healthy
      mongo-seed:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  currencyconvertor:
    build:
      context: ./currencyconvertor
    container_name: currencyconvertor
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo-currency:27017/currency_db
      SERVER_PORT: 8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-key}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
    expose:
      - "8082"
    depends_on:
      mongo-currency:
        condition: service_healthy
      mongo-currency-seed:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-key}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TEMP_SERVICE_HOST: tempconv
      TEMP_SERVICE_PORT: 8081
      CURRENCY_SERVICE_HOST: currencyconvertor
      CURRENCY_SERVICE_PORT: 8082
      RATE_LIMIT_REPLENISH: 10
      RATE_LIMIT_BURST: 20
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      tempconv:
        condition: service_started
      currencyconvertor:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: converthub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
      - tempconv
      - currencyconvertor

volumes:
  mongo-temp-data:
  mongo-currency-data:
