spring:
  application:
    name: tempconv

  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/temp_db}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

server:
  port: ${SERVER_PORT:8081}

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key}
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}
